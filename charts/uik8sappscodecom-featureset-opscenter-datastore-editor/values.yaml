metadata:
  resource:
    group: ui.k8s.appscode.com
    version: v1alpha1
    name: featuresets
    kind: FeatureSet
    scope: Cluster
  release:
    name: RELEASE-NAME
    namespace: default
resources:
  helmToolkitFluxcdIoHelmRelease_kubedb: # +doc-gen:break
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      labels:
        app.kubernetes.io/component: kubedb
      name: kubedb
      namespace: kubeops
    spec:
      chart:
        spec:
          chart: kubedb
          sourceRef:
            kind: HelmRepository
            name: appscode-charts-oci
            namespace: kubeops
          version: v2026.2.26
      install:
        crds: CreateReplace
        createNamespace: true
        remediation:
          retries: -1
      interval: 5m
      releaseName: kubedb
      storageNamespace: kubedb
      targetNamespace: kubedb
      timeout: 30m
      upgrade:
        crds: CreateReplace
        remediation:
          retries: -1
      values:
        kubedb-autoscaler:
          enabled: true
        kubedb-dashboard:
          enabled: true
        kubedb-ops-manager:
          enabled: true
        kubedb-provisioner:
          enabled: true
        kubedb-schema-manager:
          enabled: true
  helmToolkitFluxcdIoHelmRelease_kubedb_opscenter: # +doc-gen:break
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      labels:
        app.kubernetes.io/component: kubedb-opscenter
      name: kubedb-opscenter
      namespace: kubeops
    spec:
      chart:
        spec:
          chart: kubedb-opscenter
          sourceRef:
            kind: HelmRepository
            name: appscode-charts-oci
            namespace: kubeops
          version: v2026.2.26
      install:
        crds: CreateReplace
        createNamespace: true
        remediation:
          retries: -1
      interval: 5m
      releaseName: kubedb-opscenter
      storageNamespace: kubedb
      targetNamespace: kubedb
      timeout: 30m
      upgrade:
        crds: CreateReplace
        remediation:
          retries: -1
  helmToolkitFluxcdIoHelmRelease_kubedb_ui_presets: # +doc-gen:break
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      labels:
        app.kubernetes.io/component: kubedb-ui-presets
      name: kubedb-ui-presets
      namespace: kubeops
    spec:
      chart:
        spec:
          chart: kubedb-ui-presets
          sourceRef:
            kind: HelmRepository
            name: appscode-charts-oci
            namespace: kubeops
          version: v2026.3.30
      install:
        crds: CreateReplace
        createNamespace: true
        remediation:
          retries: -1
      interval: 5m
      releaseName: kubedb-ui-presets
      storageNamespace: kubedb
      targetNamespace: kubedb
      timeout: 30m
      upgrade:
        crds: CreateReplace
        remediation:
          retries: -1
      values:
        alert:
          toggle: true
        archiver:
          enable:
            default: false
            toggle: true
        authCredential:
          customize: true
          referExisting: true
        backup:
          by: BackupConfiguration
          enable:
            default: true
            toggle: true
        clusterIssuers:
          available: []
          default: ""
          toggle: true
        clusterTier:
          default: GeneralPurpose
          nodeTopology:
            available: []
            default: ""
            toggle: true
          placement:
            available: []
            default: ""
            toggle: true
          toggle: true
        customConfiguration: true
        databases:
          Cassandra:
            mode:
              available:
                - Standalone
                - Topology
              default: Topology
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          ClickHouse:
            mode:
              available:
                - Standalone
                - Topology
              default: Topology
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Druid:
            mode:
              available:
                - Topology
              default: Topology
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Elasticsearch:
            mode:
              available:
                - Combined
                - Topology
              default: Topology
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          FerretDB:
            mode:
              available:
                - PrimaryOnly
                - PrimaryAndSecondary
              default: PrimaryAndSecondary
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Hazelcast:
            mode:
              available:
                - Combined
                - Topology
              default: Topology
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Ignite:
            mode:
              available:
                - Standalone
                - Replicaset
              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Kafka:
            mode:
              available:
                - Combined
                - Topology
              default: Topology
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          MSSQLServer:
            mode:
              available:
                - Standalone
                - Topology
              default: Topology
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          MariaDB:
            mode:
              available:
