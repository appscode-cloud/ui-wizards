              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          ZooKeeper:
            mode:
              available:
                - Standalone
                - Replicaset
              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
        deletionPolicy:
          default: WipeOut
          toggle: true
        deployment:
          default: Shared
          toggle: true
        expose:
          default: false
          toggle: true
        leftPanel:
          showBackup: true
          showBackupLegacy: false
          showInsights: true
          showOperations: true
          showSecurity: false
          showVaultInfo: true
        monitoring:
          agent: prometheus.io/operator
          exporter:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
          toggle: true
        pointInTimeRecovery:
          default: false
          toggle: true
        showPreview: false
        storageClasses:
          available: []
          default: ""
          toggle: true
        tls:
          default: false
          toggle: true
