              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Memcached:
            mode:
              available:
                - Standalone
                - Replicaset
              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          MongoDB:
            mode:
              available:
                - Standalone
                - Replicaset
                - Sharded
              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          MySQL:
            mode:
              available:
                - Standalone
                - GroupReplication
                - InnoDBCluster
                - RemoteReplica
                - SemiSync
              default: GroupReplication
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Oracle:
            mode:
              available:
                - Standalone
                - DataGuard
              default: DataGuard
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          PerconaXtraDB:
            mode:
              available:
                - Standalone
                - Replicaset
              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          PgBouncer:
            mode:
              available:
                - Standalone
                - Replicaset
              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Pgpool:
            mode:
              available:
                - Standalone
                - Replicaset
              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          Postgres:
            mode:
              available:
                - Standalone
                - Cluster
                - RemoteReplica
              default: Cluster
              toggle: true
            versions:
              available: []
              default: ""
              toggle: true
          ProxySQL:
            mode:
              available:
                - Standalone
                - Replicaset
              default: Replicaset
              toggle: true
            versions:
              available: []
              default: ""
