# Default values for kubedbcom-milvus-editor-options.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

metadata:
  resource:
    group: kubedb.com
    kind: Milvus
    name: milvuss
    scope: Namespaced
    version: v1alpha2
  release:
    # Release name
    name: ""
    # Release namespace
    namespace: ""

spec:
  # Annotations to add to the database custom resource
  annotations: {}

  # Labels to add to all the template objects
  labels: {}

  # Standalone or Distributed
  mode: Standalone

  deletionPolicy: WipeOut

  persistence:
    size: 10Gi
  podResources:
    machine: ""

    resources:
      requests:
        cpu: 3
        memory: 4Gi

  # MetaStorage configuration for etcd
  metaStorage:
    externallyManaged: true
    endpoints: []
    size: 3

  # ObjectStorage configuration for MinIO/S3
  objectStorage:
    configSecretName: ""

  # Distributed topology configuration (only used when mode: Distributed)
  distributed:
    mixcoord:
      replicas: 1
      podResources:
        machine: ""
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
    proxy:
      replicas: 2
      podResources:
        machine: ""
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
    streamingnode:
      replicas: 3
      persistence:
        size: 10Gi
      podResources:
        machine: ""
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
    datanode:
      replicas: 1
      podResources:
        machine: ""
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
    querynode:
      replicas: 1
      podResources:
        machine: ""
        resources:
          requests:
            cpu: 500m
            memory: 512Mi

  disableSecurity: false
  halted: false

  authSecret:
    name: ""
    externallyManaged: false
    password: ""

  configurationSecretName: ""
  configuration: ""
  configurationInline: {}

  openshift:
    securityContext:
      runAsUser: null

  admin:
    deployment:
      default: Shared
      toggle: true
    clusterTier:
      default: "GeneralPurpose"
      toggle: true
      nodeTopology:
        available: []
        default: ""
        toggle: true
      placement:
        available: []
        default: ""
        toggle: true

    showPreview: false
    leftPanel:
      showInsights: true
      showVaultInfo: true
      showOperations: true
      showBackup: true
      showBackupLegacy: false
      showSecurity: false

    nodeSelector: {}
    tolerations: []

    databases:
      Milvus:
        versions:
          available: []
          default: ""
          toggle: true
        mode:
          available: ["Standalone", "Distributed"]
          default: "Standalone"
          toggle: true
    storageClasses:
      available: []
      default: ""
      toggle: true
    expose:
      default: false
      toggle: true

    monitoring:
      # Name of monitoring agent (one of "prometheus.io", "prometheus.io/operator", "prometheus.io/builtin")
      agent: prometheus.io/operator
      exporter:
        resources: # +doc-gen:break
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
      toggle: true
    alert:
      toggle: true

    authCredential:
      customize: true
      referExisting: true
    customConfiguration: true

    deletionPolicy:
      default: WipeOut
      toggle: true
    backup:
      enable:
        default: true
        toggle: true
      by: BackupConfiguration
      via: Restic
    archiver:
      enable:
        default: false
        toggle: true
      via: Restic
    pointInTimeRecovery:
      default: false
      toggle: true

    gitOps:
      enable:
        default: false
        toggle: false
    machineProfiles:
      machines: []
      available: []
      default: ""

  backup:
    tool: ""
    toggle: true
    kubestash:
      schedule: ""
      storageRef:
        name: ""
        namespace: ""
      retentionPolicy:
        name: ""
        namespace: ""
      encryptionSecret:
        name: ""
        namespace: ""
  monitoring:
    serviceMonitor:
      # Specify the labels for ServiceMonitor.
      # Prometheus crd will select ServiceMonitor using these labels.
      # Only usable when monitoring agent is `prometheus.io/webhook server`.
      labels: {}
