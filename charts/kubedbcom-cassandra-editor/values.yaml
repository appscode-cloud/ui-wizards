form:
  alert:
    additionalRuleLabels: {}
    annotations: {}
    enabled: warning
    groups:
      database:
        enabled: warning
        rules:
          cassandraConnectionTimeouts:
            duration: 0m
            enabled: true
            severity: warning
            val: 100
          cassandraDown:
            duration: 0m
            enabled: true
            severity: critical
          cassandraDroppedMessages:
            duration: 0m
            enabled: true
            severity: warning
            val: 1
          cassandraHighReadLatency:
            duration: 0m
            enabled: true
            severity: warning
            val: 7000
          cassandraHighWriteLatency:
            duration: 0m
            enabled: true
            severity: warning
            val: 7000
          cassandraMemoryLimit:
            duration: 0m
            enabled: true
            severity: critical
            val: 3.3554432e+07
          cassandraServiceRespawn:
            duration: 0m
            enabled: true
            severity: critical
            val: 180
      provisioner:
        enabled: warning
        rules:
          appPhaseCritical:
            duration: 5m
            enabled: true
            severity: warning
          appPhaseNotReady:
            duration: 1m
            enabled: true
            severity: critical
    labels:
      release: kube-prometheus-stack
metadata:
  resource:
    group: kubedb.com
    version: v1alpha2
    name: cassandras
    kind: Cassandra
    scope: Namespaced
  release:
    name: RELEASE-NAME
    namespace: default
