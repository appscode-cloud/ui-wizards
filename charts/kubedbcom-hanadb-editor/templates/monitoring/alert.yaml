{{ $app := (include "kubedbcom-hanadb-editor.fullname" .) }}

{{ if (include "kubedbcom-hanadb-editor.alertsEnabled" .Values.form.alert.enabled) }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ $app }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- include "kubedbcom-hanadb-editor.selectorLabels" . | nindent 4 }}
{{- if .Values.form.alert.labels }}
    {{- toYaml .Values.form.alert.labels | nindent 4 }}
{{- end }}
{{- if .Values.form.alert.annotations }}
  annotations:
    {{- toYaml .Values.form.alert.annotations | nindent 4 }}
{{- end }}
spec:
  groups:
  {{ with .Values.form.alert.groups.database -}}
  {{ if (include "kubedbcom-hanadb-editor.alertGroupEnabled" (list $.Values.form.alert.enabled .)) -}}
  - name: hanadb.database.{{ $.Release.Namespace }}.{{ $app }}.rules
    rules:
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "hanadbInstanceDown")) -}}
    - alert: HanaDBInstanceDown
      expr: up{job="{{- $app -}}-stats",namespace="{{ $.Release.Namespace }}"} == 0
      for: {{ .rules.hanadbInstanceDown.duration }}
      labels:
        severity: {{ .rules.hanadbInstanceDown.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: HanaDB instance down (instance {{`{{`}} $labels.pod {{`}}`}})
        description: "HanaDB instance is down on {{`{{`}} $labels.pod {{`}}`}}\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "hanadbServiceDown")) -}}
    - alert: HanaDBServiceDown
      expr: sum by (service) (up{job="{{ $app }}-stats",namespace="{{ $.Release.Namespace }}"}) == 0
      for: {{ .rules.hanadbServiceDown.duration }}
      labels:
        severity: {{ .rules.hanadbServiceDown.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: HanaDB service down
        description: "All HanaDB scrape targets are down\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "hanadbRestarted")) -}}
    - alert: HanaDBRestarted
      expr: (time() - min(kube_pod_start_time{namespace="{{ $.Release.Namespace }}", pod=~"{{ $.Release.Name }}(-arbiter)?-.+"})) < {{ .rules.hanadbRestarted.val }}
      for: {{ .rules.hanadbRestarted.duration }}
      labels:
        severity: {{ .rules.hanadbRestarted.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: HanaDB recently restarted (instance {{`{{`}} $labels.pod {{`}}`}})
        description: "HanaDB pod {{`{{`}} $labels.pod {{`}}`}} restarted recently.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "hanadbHighCPUUsage")) -}}
    - alert: HanaDBHighCPUUsage
      expr: avg by (pod) (hanadb_cpu_busy_percent{job="{{ $app }}-stats",namespace="{{ $.Release.Namespace }}"}) > {{ .rules.hanadbHighCPUUsage.val }}
      for: {{ .rules.hanadbHighCPUUsage.duration }}
      labels:
        severity: {{ .rules.hanadbHighCPUUsage.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: HanaDB CPU usage high (instance {{`{{`}} $labels.pod {{`}}`}})
        description: "HanaDB CPU busy percentage is above {{ .rules.hanadbHighCPUUsage.val }} percent.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "hanadbHighMemoryUsage")) -}}
    - alert: HanaDBHighMemoryUsage
      expr: |
        100 * (
          sum by (pod) (
            hanadb_host_memory_used_total_mb{job="{{ $app }}-stats",namespace="{{ $.Release.Namespace }}"}
          )
          /
          clamp_min(
            sum by (pod) (
              hanadb_host_memory_alloc_limit_mb{job="{{ $app }}-stats",namespace="{{ $.Release.Namespace }}"}
            ),
            1
          )
        ) > {{ .rules.hanadbHighMemoryUsage.val }}
      for: {{ .rules.hanadbHighMemoryUsage.duration }}
      labels:
        severity: {{ .rules.hanadbHighMemoryUsage.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: HanaDB memory usage high (instance {{`{{`}} $labels.pod {{`}}`}})
        description: "HanaDB memory usage is above {{ .rules.hanadbHighMemoryUsage.val }} percent of allocation limit.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "hanadbReplicationNotActive")) -}}
    - alert: HanaDBReplicationNotActive
      expr: max by (pod) (hanadb_sr_replication_status{job="{{ $app }}-stats",namespace="{{ $.Release.Namespace }}"}) > 0
      for: {{ .rules.hanadbReplicationNotActive.duration }}
      labels:
        severity: {{ .rules.hanadbReplicationNotActive.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: HanaDB replication is not active (instance {{`{{`}} $labels.pod {{`}}`}})
        description: "HanaDB system replication status is not ACTIVE.\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "diskUsageHigh")) -}}
    - alert: DiskUsageHigh
      expr: |
        100 * (
          (
            kubelet_volume_stats_used_bytes{job="kubelet", namespace=~"{{ $.Release.Namespace }}"}
            /
            on(namespace, persistentvolumeclaim)
            kubelet_volume_stats_capacity_bytes{job="kubelet", namespace=~"{{ $.Release.Namespace }}"}
          )
          *
          on(namespace, persistentvolumeclaim) group_left(pod)
          max by(namespace, persistentvolumeclaim, pod) (
            kube_pod_spec_volumes_persistentvolumeclaims_info{
              pod=~"{{ $.Release.Name }}(-arbiter)?-.+$",
              namespace=~"{{ $.Release.Namespace }}"
            }
          )
        ) > {{ .rules.diskUsageHigh.val }}
      for: {{ .rules.diskUsageHigh.duration }}
      labels:
        severity: {{ .rules.diskUsageHigh.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: Persistent volume usage is high
        description: "Persistent volume usage is above {{ .rules.diskUsageHigh.val }}%\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "diskAlmostFull")) -}}
    - alert: DiskAlmostFull
      expr: |
        100 * (
          (
            kubelet_volume_stats_used_bytes{job="kubelet", namespace=~"{{ $.Release.Namespace }}"}
            /
            on(namespace, persistentvolumeclaim)
            kubelet_volume_stats_capacity_bytes{job="kubelet", namespace=~"{{ $.Release.Namespace }}"}
          )
          *
          on(namespace, persistentvolumeclaim) group_left(pod)
          max by(namespace, persistentvolumeclaim, pod) (
            kube_pod_spec_volumes_persistentvolumeclaims_info{
              pod=~"{{ $.Release.Name }}(-arbiter)?-.+$",
              namespace=~"{{ $.Release.Namespace }}"
            }
          )
        ) > {{ .rules.diskAlmostFull.val }}
      for: {{ .rules.diskAlmostFull.duration }}
      labels:
        severity: {{ .rules.diskAlmostFull.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: Persistent volume is almost full
        description: "Persistent volume usage is above {{ .rules.diskAlmostFull.val }}%\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
  {{ end -}}
  {{ end -}}

  {{ with .Values.form.alert.groups.provisioner -}}
  {{ if (include "kubedbcom-hanadb-editor.alertGroupEnabled" (list $.Values.form.alert.enabled .)) -}}
  - name: hanadb.provisioner.{{ $.Release.Namespace }}.{{ $app }}.rules
    rules:
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "appPhaseNotReady")) -}}
    - alert: KubeDBHanaDBPhaseNotReady
      expr: kubedb_com_hanadb_status_phase{phase="NotReady",app="{{ $app }}",namespace="{{ $.Release.Namespace }}"} == 1
      for: {{ .rules.appPhaseNotReady.duration }}
      labels:
        severity: {{ .rules.appPhaseNotReady.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: KubeDB HanaDB Phase NotReady (hanadb {{`{{`}} $labels.app {{`}}`}})
        description: "KubeDB HanaDB phase is NotReady\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
    {{ if (include "kubedbcom-hanadb-editor.alertEnabled" (list $.Values.form.alert.enabled .enabled .rules "appPhaseCritical")) -}}
    - alert: KubeDBHanaDBPhaseCritical
      expr: kubedb_com_hanadb_status_phase{phase="Critical",app="{{ $app }}",namespace="{{ $.Release.Namespace }}"} == 1
      for: {{ .rules.appPhaseCritical.duration }}
      labels:
        severity: {{ .rules.appPhaseCritical.severity }}
        {{- include "kubedbcom-hanadb-editor.alertLabels" $ | nindent 8 }}
      annotations:
        summary: KubeDB HanaDB Phase Critical (hanadb {{`{{`}} $labels.app {{`}}`}})
        description: "KubeDB HanaDB phase is Critical\n  VALUE = {{`{{`}} $value {{`}}`}}\n  LABELS = {{`{{`}} $labels {{`}}`}}"
    {{- end }}
  {{ end -}}
  {{ end -}}
{{ end }}
