metadata:
  resource:
    group: ui.k8s.appscode.com
    version: v1alpha1
    name: featuresets
    kind: FeatureSet
    scope: Cluster
  release:
    name: RELEASE-NAME
    namespace: default
resources:
  helmToolkitFluxcdIoHelmRelease_gcp_credential_manager: # +doc-gen:break
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      labels:
        app.kubernetes.io/component: gcp-credential-manager
      name: gcp-credential-manager
      namespace: kubeops
    spec:
      chart:
        spec:
          chart: gcp-credential-manager
          sourceRef:
            kind: HelmRepository
            name: appscode-charts-oci
            namespace: kubeops
          version: v2026.3.11
      install:
        crds: CreateReplace
        createNamespace: true
        remediation:
          retries: -1
      interval: 5m
      releaseName: gcp-credential-manager
      storageNamespace: kube-system
      targetNamespace: kube-system
      timeout: 30m
      upgrade:
        crds: CreateReplace
        remediation:
          retries: -1
