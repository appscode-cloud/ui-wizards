# Default values for kubedbcom-qdrant-editor-options.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

metadata:
  resource:
    group: kubedb.com
    kind: Qdrant
    name: qdrants
    scope: Namespaced
    version: v1alpha2
  release:
    # Release name
    name: ""
    # Release namespace
    namespace: ""

spec:
  # Annotations to add to the database custom resource
  annotations: {}

  # Labels to add to all the template objects
  labels: {}

  # Standalone or Distributed
  mode: Standalone
  replicas: 3

  storageType: ""

  deletionPolicy: WipeOut

  persistence:
    size: 2Gi
  podResources:
    machine: ""

    resources:
      requests:
        cpu: 500m
        memory: 1Gi

  disableSecurity: false
  halted: false

  authSecret:
    name: ""

    password: ""
  configuration: ""

  tls:
    issuerRef:
      apiGroup: cert-manager.io
      kind: Issuer
      name: ""
    p2p: false
    client: false

  openshift:
    securityContext:
      runAsUser: null

  admin:
    deployment:
      default: Shared
      toggle: true
    clusterTier:
      default: "GeneralPurpose"
      toggle: true
      nodeTopology:
        available: []
        default: ""
        toggle: true
      placement:
        available: []
        default: ""
        toggle: true

    showPreview: false
    leftPanel:
      showInsights: true
      showVaultInfo: true
      showOperations: true
      showBackup: true
      showBackupLegacy: false
      showSecurity: false

    nodeSelector: {}
    tolerations: []

    databases:
      Qdrant:
        versions:
          available: []
          default: ""
          toggle: true
        mode:
          available: ["Standalone", "Distributed"]
          default: "Standalone"
          toggle: true
    storageClasses:
      available: []
      default: ""
      toggle: true

    tls:
      default: false
      toggle: true
    clusterIssuers:
      available: []
      default: ""
      toggle: true
    expose:
      enable:
        default: false
        toggle: true
      uiExposure:
        disableUI: false
        disableCostEfficiency: false

    monitoring:
      # Name of monitoring agent (one of "prometheus.io", "prometheus.io/operator", "prometheus.io/builtin")
      agent: prometheus.io/operator
      exporter:
        port: 0
        resources: # +doc-gen:break
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
      toggle: true
    alert:
      toggle: true

    authCredential:
      customize: true
      referExisting: true
    customConfiguration: true

    deletionPolicy:
      default: WipeOut
      toggle: true
    backup:
      enable:
        default: true
        toggle: true
      by: BackupConfiguration
      via: Restic
    archiver:
      enable:
        default: false
        toggle: true
      via: Restic
    pointInTimeRecovery:
      default: false
      toggle: true

    gitOps:
      enable:
        default: false
        toggle: false
    machineProfiles:
      machines: []
      available: []
      default: ""

  backup:
    tool: ""
    toggle: true
    kubestash:
      schedule: ""
      storageRef:
        name: ""
        namespace: ""
      retentionPolicy:
        name: ""
        namespace: ""
      encryptionSecret:
        name: ""
        namespace: ""
  monitoring:
    serviceMonitor:
      interval: 10s
      # Specify the labels for ServiceMonitor.
      # Prometheus crd will select ServiceMonitor using these labels.
      # Only usable when monitoring agent is `prometheus.io/webhook server`.
      labels: {}
form:
  alert:
    ## Enable PrometheusRule alerts
    enabled: warning

    ## Labels for default rules
    labels: # +doc-gen:break
      release: prometheus

    ## Annotations for default rules
    annotations: {}

    ## Additional labels for PrometheusRule alerts
    additionalRuleLabels: {}

    ## Prefix for runbook URLs. Use this to override the first part of the runbookURLs that is common to all rules.
    # runbookUrl: "https://runbooks.prometheus-operator.dev/runbooks"

    groups:
      database:
        enabled: warning
        rules:
          # Specifies the alert configuration for database is in NotReady phase, that means the database is not accepting connections, read/write are hampered.
          qdrantInstanceDown:
            enabled: true
            duration: "30s"
            severity: critical
          # Specifies the alert configuration for database is in Critical phase, that means one or more database nodes are experiencing issues but the database is still operational.
          qdrantPhaseCritical:
            enabled: true
            duration: "1m"
            severity: warning
          # Specifies the alert configuration for database service restarts, indicating the database service has been restarted recently.
          qdrantRestarted:
            enabled: true
            duration: "1m"
            severity: warning
            val: 180
          # Specifies the alert configuration for database cpu usage (ratio usage/limits).
          qdrantHighCPUUsage:
            enabled: true
            duration: "1m"
            severity: warning
            val: 80
          # Specifies the alert configuration for database memory usage (ratio working_set/limits).
          qdrantHighMemoryUsage:
            enabled: true
            duration: "1m"
            severity: warning
            val: 80
          # Specifies the alert configuration for persistent volume usage, indicating when storage usage exceeds the defined threshold.
          diskUsageHigh:
            enabled: true
            val: 80
            duration: "1m"
            severity: warning
          diskAlmostFull:
            enabled: true
            val: 95
            duration: "1m"
            severity: critical

# Specifies the alert configuration for pending operations backlog, indicating when the number of pending operations exceeds the threshold.
          qdrantHighPendingOperations:
            enabled: true
            val: 10
            duration: "5m"
            severity: critical

# Specifies the alert configuration for gRPC response failures, indicating when the number of failed gRPC responses exceeds the threshold.
          qdrantGrpcResponsesFailHigh:
            enabled: true
            val: 5
            duration: "5m"
            severity: critical

# Specifies the alert configuration for REST response failures, indicating when the number of failed REST responses exceeds the threshold.
          qdrantRestResponsesFailHigh:
            enabled: true
            val: 5
            duration: "5m"
            severity: critical

      provisioner:
        enabled: warning
        rules:
          appPhaseNotReady:
            enabled: true
            duration: "1m"
            severity: critical
          appPhaseCritical:
            enabled: true
            duration: "15m"
            severity: warning
