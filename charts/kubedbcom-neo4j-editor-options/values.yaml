# Default values for kubedbcom-neo4j-editor-options.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

metadata:
  resource:
    group: kubedb.com
    kind: Neo4j
    name: neo4js
    scope: Namespaced
    version: v1alpha2
  release:
    # Release name
    name: ""
    # Release namespace
    namespace: ""

spec:
  # Annotations to add to the database custom resource
  annotations: {}

  # Labels to add to all the template objects
  labels: {}

  # Standalone, Replicaset
  mode: Replicaset
  replicas: 3

  storageType: ""

  deletionPolicy: WipeOut

  disableSecurity: false

  persistence:
    size: 4Gi
  podResources:
    machine: ""

    resources:
      requests:
        cpu: 3
        memory: 4Gi

  authSecret:
    name: ""

    password: ""
  configuration: ""

  tls:
    issuerRef:
      apiGroup: cert-manager.io
      kind: Issuer
      name: ""
    bolt:
      mode: TLS
    http:
      mode: TLS
    cluster:
      mode: mTLS

  openshift:
    securityContext:
      runAsUser: null

  admin:
    deployment:
      default: Shared
      toggle: true
    clusterTier:
      default: "GeneralPurpose"
      toggle: true
      nodeTopology:
        available: []
        default: ""
        toggle: true
      placement:
        available: []
        default: ""
        toggle: true

    showPreview: false
    leftPanel:
      showInsights: true
      showVaultInfo: true
      showOperations: true
      showBackup: true
      showBackupLegacy: false
      showSecurity: false

    nodeSelector: {}
    tolerations: []

    databases:
      Neo4j:
        versions:
          available: []
          default: ""
          toggle: true
        mode:
          available: ["Standalone", "Replicaset"]
          default: "Replicaset"
          toggle: true
    storageClasses:
      available: []
      default: ""
      toggle: true

    tls:
      default: false
      toggle: true
    clusterIssuers:
      available: []
      default: ""
      toggle: true
    expose:
      enable:
        default: false
        toggle: true
      uiExposure:
        disableUI: false
        disableCostEfficiency: false

    monitoring:
      # Name of monitoring agent (one of "prometheus.io", "prometheus.io/operator", "prometheus.io/builtin")
      agent: prometheus.io/operator
      exporter:
        port: 0
        resources: # +doc-gen:break
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
      toggle: true
    alert:
      toggle: true

    authCredential:
      customize: true
      referExisting: true
    customConfiguration: true

    deletionPolicy:
      default: WipeOut
      toggle: true
    backup:
      enable:
        default: true
        toggle: true
      by: BackupConfiguration
      via: Restic
    archiver:
      enable:
        default: false
        toggle: true
      via: Restic
    pointInTimeRecovery:
      default: false
      toggle: true

    gitOps:
      enable:
        default: false
        toggle: false
    machineProfiles:
      machines: []
      available: []
      default: ""

  backup:
    tool: ""
    toggle: true
    kubestash:
      schedule: ""
      storageRef:
        name: ""
        namespace: ""
      retentionPolicy:
        name: ""
        namespace: ""
      encryptionSecret:
        name: ""
        namespace: ""
  monitoring:
    serviceMonitor:
      interval: 10s
      # Specify the labels for ServiceMonitor.
      # Prometheus crd will select ServiceMonitor using these labels.
      # Only usable when monitoring agent is `prometheus.io/webhook server`.
      labels: {}
form:
  alert:
    ## Enable PrometheusRule alerts
    enabled: warning

    ## Labels for default rules
    labels: # +doc-gen:break
      release: prometheus

    ## Annotations for default rules
    annotations: {}

    ## Additional labels for PrometheusRule alerts
    additionalRuleLabels: {}

    groups:
      database:
        enabled: warning
        rules:
          # Resource usage alerts
          neo4jHighCPUUsage:
            enabled: true
            duration: "1m"
            severity: warning
            val: 80

          neo4jHighMemoryUsage:
            enabled: true
            duration: "1m"
            severity: warning
            val: 80

          # Page Cache Alerts (db.page_cache.* metrics)
          # usage_ratio: The ratio of number of used pages to total number of available pages.
          # This metric shows what percentage of the allocated page cache is being used.
          neo4jPageCacheUsageRatioHigh:
            enabled: true
            duration: "5m"
            severity: warning
            val: 0.85

          # hit_ratio: The ratio of hits to the total number of lookups in the page cache.
          # Performance relies on efficiently using the page cache, so this should be in 98-100% range.
          neo4jPageCacheHitRatioLow:
            enabled: true
            duration: "5m"
            severity: warning
            val: 0.98

          # page_faults: The total number of page faults in the page cache.
          # If this count keeps increasing, it may indicate more page cache is required.
          neo4jPageFaultsHigh:
            enabled: true
            duration: "5m"
            severity: warning
            val: 5000

          # page_fault_failures: Failed page faults in the page cache.
          # This indicates potential disk I/O issues or corruption.
          neo4jPageFaultFailuresHigh:
            enabled: true
            duration: "5m"
            severity: critical
            val: 0

          # Specifies the alert configuration for persistent volume usages.
          diskUsageHigh:
            enabled: true
            val: 80
            duration: "1m"
            severity: warning

          diskAlmostFull:
            enabled: true
            val: 95
            duration: "1m"
            severity: critical

      provisioner:
        enabled: warning
        rules:
          appPhaseNotReady:
            enabled: true
            duration: "1m"
            severity: critical

          appPhaseCritical:
            enabled: true
            duration: "15m"
            severity: warning
