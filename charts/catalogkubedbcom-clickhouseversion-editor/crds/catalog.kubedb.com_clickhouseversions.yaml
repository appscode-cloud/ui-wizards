apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clickhouseversions.catalog.kubedb.com
spec:
  group: catalog.kubedb.com
  names:
    kind: ClickHouseVersion
    listKind: ClickHouseVersionList
    plural: clickhouseversions
    singular: clickhouseversion
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              archiver:
                properties:
                  addon:
                    properties:
                      name:
                        enum:
                        - mongodb-addon
                        - postgres-addon
                        - mysql-addon
                        - mariadb-addon
                        - mssqlserver-addon
                        - clickhouse-addon
                        type: string
                      tasks:
                        properties:
                          fullBackup:
                            properties:
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          fullBackupRestore:
                            properties:
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          incBackupRestore:
                            properties:
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          manifestBackup:
                            properties:
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          manifestRestore:
                            properties:
                              name:
                                type: string
                            required:
                            - name
                            type: object
                          volumeSnapshot:
                            properties:
                              name:
                                type: string
                            required:
                            - name
                            type: object
                        type: object
                    type: object
                  walg:
                    properties:
                      image:
                        type: string
                    required:
                    - image
                    type: object
                type: object
              clickHouseKeeper:
                properties:
                  image:
                    type: string
                required:
                - image
                type: object
              db:
                properties:
                  image:
                    type: string
                required:
                - image
                type: object
              endOfLife:
                type: boolean
              initContainer:
                properties:
                  image:
                    type: string
                required:
                - image
                type: object
              securityContext:
                properties:
                  runAsUser:
                    format: int64
                    type: integer
                type: object
              ui:
                items:
                  properties:
                    disable:
                      type: boolean
                    name:
                      type: string
                    values:
                      x-kubernetes-preserve-unknown-fields: true
                    version:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              updateConstraints:
                properties:
                  allowlist:
                    items:
                      type: string
                    type: array
                  denylist:
                    items:
                      type: string
                    type: array
                type: object
              version:
                type: string
            required:
            - clickHouseKeeper
            - db
            - initContainer
            - version
            type: object
        type: object
    served: true
    storage: true
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
