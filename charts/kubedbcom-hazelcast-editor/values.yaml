form:
  alert:
    additionalRuleLabels: {}
    annotations: {}
    enabled: warning
    groups:
      database:
        enabled: warning
        rules:
          diskAlmostFull:
            duration: 1m
            enabled: true
            severity: critical
            val: 95
          diskUsageHigh:
            duration: 1m
            enabled: true
            severity: warning
            val: 80
          hazelcastDown:
            duration: 30s
            enabled: true
            severity: critical
          hazelcastHighHeapPercentage:
            duration: 30s
            enabled: true
            severity: warning
            val: 80
          hazelcastHighLatency:
            duration: 30s
            enabled: true
            severity: warning
            val: 2.5
          hazelcastHighMemoryUsage:
            duration: 30s
            enabled: true
            severity: warning
            val: 80
          hazelcastHighPhysicalMemoryUsage:
            duration: 30s
            enabled: true
            severity: warning
            val: 50
          hazelcastPartitionCountExceed:
            duration: 30s
            enabled: true
            severity: warning
            val: 92
          hazelcastPhaseCritical:
            duration: 3m
            enabled: true
            severity: warning
          hazelcastSystemCPULoadExceed:
            duration: 30s
            enabled: true
            severity: warning
            val: 5
      opsManager:
        enabled: warning
        rules:
          opsRequestFailed:
            duration: 0m
            enabled: true
            severity: critical
          opsRequestOnProgress:
            duration: 0m
            enabled: true
            severity: info
          opsRequestStatusProgressingToLong:
            duration: 30m
            enabled: true
            severity: critical
      provisioner:
        enabled: warning
        rules:
          appPhaseCritical:
            duration: 15m
            enabled: true
            severity: warning
          appPhaseNotReady:
            duration: 1m
            enabled: true
            severity: critical
    labels:
      release: kube-prometheus-stack
metadata:
  resource:
    group: kubedb.com
    version: v1alpha2
    name: hazelcasts
    kind: Hazelcast
    scope: Namespaced
  release:
    name: RELEASE-NAME
    namespace: default
resources:
  autoscalingKubedbComHazelcastAutoscaler: # +doc-gen:break
    apiVersion: autoscaling.kubedb.com/v1alpha1
    kind: HazelcastAutoscaler
    metadata:
      name: hazelcast
      namespace: demo
    spec:
      compute:
        hazelcast:
          maxAllowed:
            cpu: 1
            memory: 2Gi
          minAllowed:
            cpu: 400m
            memory: 400Mi
          podLifeTimeThreshold: 10m
          resourceDiffPercentage: 20
          trigger: "On"
        nodeTopology:
          name: standard-basv2-family
      databaseRef:
        name: hazelcast
      opsRequestOptions:
        apply: IfReady
        timeout: 10m
  catalogAppscodeComHazelcastBinding: # +doc-gen:break
    apiVersion: catalog.appscode.com/v1alpha1
    kind: HazelcastBinding
    metadata:
      name: hazelcast
      namespace: demo
    spec:
      sourceRef:
        name: hazelcast
        namespace: demo
  certManagerIoIssuer_ca: # +doc-gen:break
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: hazelcast-ca
      namespace: demo
    spec:
      ca:
        secretName: hazelcast-ca
  kubedbComHazelcast: # +doc-gen:break
    apiVersion: kubedb.com/v1alpha2
    kind: Hazelcast
    metadata:
      name: hazelcast
      namespace: hazelcast
    spec:
      deletionPolicy: Halt
      podTemplate:
        spec:
          containers:
            - name: hazelcast
              resources:
                requests:
                  cpu: 700m
                  memory: 1200Mi
          nodeSelector:
            app: kubedb
            component: hazelcast-database
            instance: hazelcast
          tolerations:
            - effect: NoSchedule
              key: app
              operator: Equal
              value: kubedb
            - effect: NoSchedule
              key: instance
              operator: Equal
              value: hazelcast
            - effect: NoSchedule
              key: component
              operator: Equal
              value: hazelcast-database
            - effect: NoSchedule
              key: nodepool_type
              operator: Equal
              value: n2-standard-2
      replicas: 3
      serviceTemplates:
        - alias: primary
          spec:
            type: LoadBalancer
      storage:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
      version: 3.8.3
  monitoringCoreosComServiceMonitor: # +doc-gen:break
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: hazelcast
      namespace: demo
    spec:
      endpoints:
        - honorLabels: true
          interval: 30s
          path: /metrics
          port: metrics
      namespaceSelector:
        matchNames:
          - demo
      selector:
        matchLabels:
          app.kubernetes.io/instance: hazelcast
          app.kubernetes.io/name: hazelcasts.kubedb.com
  secret_auth: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: hazelcast-auth
      namespace: demo
    stringData:
      password: thisIs1StrongPassword
      username: root
    type: Opaque
  secret_config: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: hazelcast-config
      namespace: demo
    stringData:
      hazelcast.cnf: |
        [mysqld]
        max_connections = 200
        read_buffer_size = 1048576
    type: Opaque
