form:
  alert:
    additionalRuleLabels: {}
    annotations: {}
    enabled: warning
    groups:
      database:
        enabled: warning
        rules:
          druidDown:
            duration: 1m
            enabled: true
            severity: critical
          highJVMMemoryUsage:
            duration: 30s
            enabled: true
            severity: critical
            val: 95
          highJVMPoolUsage:
            duration: 30s
            enabled: true
            severity: warning
            val: 95
          highQueryTime:
            duration: 1m
            enabled: true
            severity: warning
          highQueryWaitTime:
            duration: 1m
            enabled: true
            severity: warning
          highSegmentScanPending:
            duration: 1m
            enabled: true
            severity: warning
            val: 2
          highSegmentUsage:
            duration: 1m
            enabled: true
            severity: critical
            val: 95
          zkDisconnected:
            duration: 1m
            enabled: true
            severity: critical
      opsManager:
        enabled: warning
        rules:
          opsRequestFailed:
            duration: 0m
            enabled: true
            severity: critical
          opsRequestOnProgress:
            duration: 0m
            enabled: true
            severity: info
          opsRequestStatusProgressingToLong:
            duration: 30m
            enabled: true
            severity: critical
      provisioner:
        enabled: warning
        rules:
          appPhaseCritical:
            duration: 15m
            enabled: true
            severity: warning
          appPhaseNotReady:
            duration: 1m
            enabled: true
            severity: critical
    labels:
      release: prometheus
metadata:
  resource:
    group: kubedb.com
    version: v1alpha2
    name: druids
    kind: Druid
    scope: Namespaced
  release:
    name: RELEASE-NAME
    namespace: default
