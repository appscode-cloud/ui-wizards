form:
  alert:
    additionalRuleLabels: {}
    annotations: {}
    enabled: warning
    groups:
      database:
        enabled: warning
        rules:
          druidDown:
            duration: 1m
            enabled: true
            severity: critical
          highJVMMemoryUsage:
            duration: 30s
            enabled: true
            severity: critical
            val: 95
          highJVMPoolUsage:
            duration: 30s
            enabled: true
            severity: warning
            val: 95
          highQueryTime:
            duration: 1m
            enabled: true
            severity: warning
          highQueryWaitTime:
            duration: 1m
            enabled: true
            severity: warning
          highSegmentScanPending:
            duration: 1m
            enabled: true
            severity: warning
            val: 2
          highSegmentUsage:
            duration: 1m
            enabled: true
            severity: critical
            val: 95
          zkDisconnected:
            duration: 1m
            enabled: true
            severity: critical
      opsManager:
        enabled: warning
        rules:
          opsRequestFailed:
            duration: 0m
            enabled: true
            severity: critical
          opsRequestOnProgress:
            duration: 0m
            enabled: true
            severity: info
          opsRequestStatusProgressingToLong:
            duration: 30m
            enabled: true
            severity: critical
      provisioner:
        enabled: warning
        rules:
          appPhaseCritical:
            duration: 15m
            enabled: true
            severity: warning
          appPhaseNotReady:
            duration: 1m
            enabled: true
            severity: critical
    labels:
      release: prometheus
metadata:
  resource:
    group: kubedb.com
    version: v1alpha2
    name: druids
    kind: Druid
    scope: Namespaced
  release:
    name: RELEASE-NAME
    namespace: default
resources:
  autoscalingKubedbComDruidAutoscaler: # +doc-gen:break
    apiVersion: autoscaling.kubedb.com/v1alpha1
    kind: DruidAutoscaler
    metadata:
      name: druid
      namespace: demo
    spec:
      compute:
        node:
          maxAllowed:
            cpu: 1
            memory: 2Gi
          minAllowed:
            cpu: 400m
            memory: 400Mi
          podLifeTimeThreshold: 10m
          resourceDiffPercentage: 20
          trigger: "On"
        nodeTopology:
          name: standard-basv2-family
      databaseRef:
        name: druid
      opsRequestOptions:
        apply: IfReady
        timeout: 10m
  catalogAppscodeComDruidBinding: # +doc-gen:break
    apiVersion: catalog.appscode.com/v1alpha1
    kind: DruidBinding
    metadata:
      name: druid
      namespace: demo
    spec:
      sourceRef:
        name: druid
        namespace: demo
  certManagerIoIssuer_ca: # +doc-gen:break
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: druid-ca
      namespace: demo
    spec:
      ca:
        secretName: druid-ca
  coreKubestashComBackupBlueprint: # +doc-gen:break
    apiVersion: core.kubestash.com/v1alpha1
    kind: BackupBlueprint
    metadata:
      name: druid
      namespace: demo
    spec:
      backupConfigurationTemplate:
        backends:
          - name: druid-backend
            retentionPolicy:
              name: druid-retention-policy
              namespace: demo
            storageRef:
              name: druid-storage
              namespace: demo
        sessions:
          - addon:
              jobTemplate:
                spec:
                  containerSecurityContext:
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                    runAsGroup: 0
                    runAsNonRoot: true
                    runAsUser: 999
                    seccompProfile:
                      type: RuntimeDefault
                  nodeSelector:
                    kubernetes.io/os: linux
              name: druid-addon
              tasks:
                - name: logical-backup
            name: druid-frequent-backup
            repositories:
              - backend: druid-backend
                directory: /druid-repo
                encryptionSecret:
                  name: druid-encryption-secret
                  namespace: demo
                name: druid-repo
            scheduler:
              failedJobsHistoryLimit: 4
