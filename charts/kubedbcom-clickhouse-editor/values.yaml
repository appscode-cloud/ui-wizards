                          - ALL
                      runAsGroup: 0
                      runAsNonRoot: true
                      runAsUser: 999
                      seccompProfile:
                        type: RuntimeDefault
                    nodeSelector:
                      kubernetes.io/os: linux
              schedule: 0 */2 * * *
              successfulJobsHistoryLimit: 2
            sessionHistoryLimit: 3
      usagePolicy:
