    namespace: default
resources:
  autoscalingKubedbComClickHouseAutoscaler: # +doc-gen:break
    apiVersion: autoscaling.kubedb.com/v1alpha1
    kind: ClickHouseAutoscaler
    metadata:
      name: clickhouse
      namespace: demo
    spec:
      compute:
        clickhouse:
          maxAllowed:
            cpu: 1
            memory: 2Gi
          minAllowed:
            cpu: 400m
            memory: 400Mi
          podLifeTimeThreshold: 10m
          resourceDiffPercentage: 20
          trigger: "On"
        nodeTopology:
          name: standard-basv2-family
      databaseRef:
        name: clickhouse
      opsRequestOptions:
        apply: IfReady
        timeout: 10m
  catalogAppscodeComClickHouseBinding: # +doc-gen:break
    apiVersion: catalog.appscode.com/v1alpha1
    kind: ClickHouseBinding
    metadata:
      name: clickhouse
      namespace: demo
    spec:
      sourceRef:
        name: clickhouse
        namespace: demo
  certManagerIoIssuer_ca: # +doc-gen:break
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: clickhouse-ca
      namespace: demo
    spec:
      ca:
        secretName: clickhouse-ca
  coreKubestashComBackupBlueprint: # +doc-gen:break
    apiVersion: core.kubestash.com/v1alpha1
    kind: BackupBlueprint
    metadata:
      name: clickhouse
      namespace: demo
    spec:
      backupConfigurationTemplate:
        backends:
          - name: clickhouse-backend
            retentionPolicy:
              name: clickhouse-retention-policy
              namespace: demo
            storageRef:
              name: clickhouse-storage
              namespace: demo
        sessions:
          - addon:
              jobTemplate:
                spec:
                  containerSecurityContext:
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                    runAsGroup: 0
                    runAsNonRoot: true
                    runAsUser: 999
                    seccompProfile:
                      type: RuntimeDefault
                  nodeSelector:
                    kubernetes.io/os: linux
              name: clickhouse-addon
              tasks:
                - name: logical-backup
            name: clickhouse-frequent-backup
            repositories:
              - backend: clickhouse-backend
                directory: /clickhouse-repo
                encryptionSecret:
                  name: clickhouse-encryption-secret
                  namespace: demo
                name: clickhouse-repo
            scheduler:
              failedJobsHistoryLimit: 4
              jobTemplate:
                backoffLimit: 2
                template:
                  spec:
                    containerSecurityContext:
                      allowPrivilegeEscalation: false
