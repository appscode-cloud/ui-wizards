form:
  alert:
    additionalRuleLabels: {}
    annotations: {}
    enabled: warning
    groups:
      database:
        enabled: warning
        rules:
          diskAlmostFull:
            duration: 1m
            enabled: true
            severity: critical
            val: 95
          diskUsageHigh:
            duration: 1m
            enabled: true
            severity: warning
            val: 80
          kafkaAbnormalControllerState:
            duration: 10s
            enabled: true
            severity: warning
            val: 1
          kafkaBrokerCount:
            duration: 1m
            enabled: true
            severity: critical
            val: 0
          kafkaDown:
            duration: 30s
            enabled: true
            severity: critical
          kafkaISRExpandRate:
            duration: 1m
            enabled: true
            severity: warning
            val: 0
          kafkaISRShrinkRate:
            duration: 1m
            enabled: true
            severity: warning
            val: 0
          kafkaNetworkProcessorIdlePercent:
            duration: 1m
            enabled: true
            severity: critical
            val: 30
          kafkaOfflineLogDirectoryCount:
            duration: 10s
            enabled: true
            severity: warning
            val: 0
          kafkaOfflinePartitions:
            duration: 10s
            enabled: true
            severity: warning
            val: 0
          kafkaPhaseCritical:
            duration: 3m
            enabled: true
            severity: warning
          kafkaReplicaFetcherManagerMaxLag:
            duration: 1m
            enabled: true
            severity: critical
            val: 50
          kafkaRequestHandlerIdlePercent:
            duration: 1m
            enabled: true
            severity: critical
            val: 30
          kafkaTopicCount:
            duration: 1m
            enabled: true
            severity: warning
            val: 1000
          kafkaUnderMinIsrPartitionCount:
            duration: 10s
            enabled: true
            severity: warning
            val: 0
          kafkaUnderReplicatedPartitions:
            duration: 10s
            enabled: true
            severity: warning
            val: 0
      opsManager:
        enabled: warning
        rules:
          opsRequestFailed:
            duration: 0m
            enabled: true
            severity: critical
          opsRequestOnProgress:
            duration: 0m
            enabled: true
            severity: info
          opsRequestStatusProgressingToLong:
            duration: 30m
            enabled: true
            severity: critical
      provisioner:
        enabled: warning
        rules:
          appPhaseCritical:
            duration: 15m
            enabled: true
            severity: warning
          appPhaseNotReady:
            duration: 1m
            enabled: true
            severity: critical
    labels:
      release: kube-prometheus-stack
metadata:
  resource:
    group: kubedb.com
    version: v1
    name: kafkas
    kind: Kafka
    scope: Namespaced
  release:
    name: RELEASE-NAME
    namespace: default
resources:
  autoscalingKubedbComKafkaAutoscaler: # +doc-gen:break
    apiVersion: autoscaling.kubedb.com/v1alpha1
    kind: KafkaAutoscaler
    metadata:
      name: kafka
      namespace: demo
  catalogAppscodeComKafkaBinding: # +doc-gen:break
    apiVersion: catalog.appscode.com/v1alpha1
    kind: KafkaBinding
    metadata:
      name: kafka
      namespace: demo
  gitopsKubedbComKafka: # +doc-gen:break
    apiVersion: gitops.kubedb.com/v1alpha1
    kind: Kafka
    metadata:
      name: kafka
      namespace: demo
  kubedbComKafka: # +doc-gen:break
    apiVersion: kubedb.com/v1
    kind: Kafka
    metadata:
      name: kafka
      namespace: demo
  monitoringCoreosComServiceMonitor: # +doc-gen:break
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: kafka
      namespace: demo
  secret_admin_cred: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: kafka-admin-cred
      namespace: demo
