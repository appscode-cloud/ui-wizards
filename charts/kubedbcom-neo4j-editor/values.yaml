form:
  alert:
    additionalRuleLabels: {}
    annotations: {}
    enabled: warning
    groups:
      database:
        enabled: warning
        rules:
          diskAlmostFull:
            duration: 1m
            enabled: true
            severity: critical
            val: 95
          diskUsageHigh:
            duration: 1m
            enabled: true
            severity: warning
            val: 80
          neo4jHighCPUUsage:
            duration: 1m
            enabled: true
            severity: warning
            val: 80
          neo4jHighMemoryUsage:
            duration: 1m
            enabled: true
            severity: warning
            val: 80
          neo4jPageCacheHitRatioLow:
            duration: 5m
            enabled: true
            severity: warning
            val: 0.98
          neo4jPageCacheUsageRatioHigh:
            duration: 5m
            enabled: true
            severity: warning
            val: 0.85
          neo4jPageFaultFailuresHigh:
            duration: 5m
            enabled: true
            severity: critical
            val: 0
          neo4jPageFaultsHigh:
            duration: 5m
            enabled: true
            severity: warning
            val: 5000
      provisioner:
        enabled: warning
        rules:
          appPhaseCritical:
            duration: 15m
            enabled: true
            severity: warning
          appPhaseNotReady:
            duration: 1m
            enabled: true
            severity: critical
    labels:
      release: prometheus
metadata:
