form:
  alert:
    additionalRuleLabels: {}
    annotations: {}
    enabled: warning
    groups:
      database:
        enabled: warning
        rules:
          pgbouncerDown:
            duration: 0m
            enabled: true
            severity: critical
          pgbouncerExporterLastScrapeError:
            duration: 0m
            enabled: true
            severity: warning
          pgbouncerLogPoolerError:
            duration: 0m
            enabled: true
            severity: critical
            val: 10
          pgbouncerTooManyConnections:
            duration: 1m
            enabled: true
            severity: warning
            val: 70
      opsManager:
        enabled: warning
        rules:
          opsRequestFailed:
            duration: 0m
            enabled: true
            severity: critical
          opsRequestOnProgress:
            duration: 0m
            enabled: true
            severity: info
          opsRequestStatusProgressingToLong:
            duration: 30m
            enabled: true
            severity: critical
      provisioner:
        enabled: warning
        rules:
          appPhaseCritical:
            duration: 15m
            enabled: true
            severity: warning
          appPhaseNotReady:
            duration: 1m
            enabled: true
            severity: critical
    labels:
      release: prometheus
metadata:
  resource:
    group: kubedb.com
    version: v1
    name: pgbouncers
    kind: PgBouncer
    scope: Namespaced
  release:
    name: RELEASE-NAME
    namespace: default
resources:
  autoscalingKubedbComPgBouncerAutoscaler: # +doc-gen:break
    apiVersion: autoscaling.kubedb.com/v1alpha1
    kind: PgBouncerAutoscaler
    metadata:
      name: pgbouncer
      namespace: demo
  catalogAppscodeComPgBouncerBinding: # +doc-gen:break
    apiVersion: catalog.appscode.com/v1alpha1
    kind: PgBouncerBinding
    metadata:
      name: pgbouncer
      namespace: demo
  certManagerIoIssuer_ca: # +doc-gen:break
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: pgbouncer-ca
      namespace: demo
  gitopsKubedbComPgBouncer: # +doc-gen:break
    apiVersion: gitops.kubedb.com/v1alpha1
    kind: PgBouncer
    metadata:
      name: pgbouncer
      namespace: demo
  kubedbComPgBouncer: # +doc-gen:break
    apiVersion: kubedb.com/v1
    kind: PgBouncer
    metadata:
      name: pgbouncer
      namespace: demo
  monitoringCoreosComServiceMonitor: # +doc-gen:break
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: pgbouncer
      namespace: demo
  secret_auth: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: pgbouncer-auth
      namespace: demo
  secret_config: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: pgbouncer-config
      namespace: demo
