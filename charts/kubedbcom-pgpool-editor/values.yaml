form:
  alert:
    additionalRuleLabels: {}
    annotations: {}
    enabled: warning
    groups:
      database:
        enabled: warning
        rules:
          pgpoolBackendErrorMessageCount:
            duration: 0m
            enabled: true
            severity: critical
            val: 10
          pgpoolBackendFatalMessageCount:
            duration: 0m
            enabled: true
            severity: critical
            val: 10
          pgpoolBackendPanicMessageCount:
            duration: 0m
            enabled: true
            severity: critical
            val: 10
          pgpoolDown:
            duration: 0m
            enabled: true
            severity: critical
          pgpoolExporterLastScrapeError:
            duration: 0m
            enabled: true
            severity: warning
          pgpoolLowCacheMemory:
            duration: 1m
            enabled: true
            severity: warning
            val: 100
          pgpoolPostgresHealthCheckFailure:
            duration: 0m
            enabled: true
            severity: critical
            val: 10
          pgpoolTooManyConnections:
            duration: 1m
            enabled: true
            severity: warning
            val: 0.1
      opsManager:
        enabled: warning
        rules:
          opsRequestFailed:
            duration: 0m
            enabled: true
            severity: critical
          opsRequestOnProgress:
            duration: 0m
            enabled: true
            severity: info
          opsRequestStatusProgressingToLong:
            duration: 30m
            enabled: true
            severity: critical
      provisioner:
        enabled: warning
        rules:
          appPhaseCritical:
            duration: 15m
            enabled: true
            severity: warning
          appPhaseNotReady:
            duration: 1m
            enabled: true
            severity: critical
    labels:
      release: prometheus
metadata:
  resource:
    group: kubedb.com
    version: v1alpha2
    name: pgpools
    kind: Pgpool
    scope: Namespaced
  release:
    name: RELEASE-NAME
    namespace: default
resources:
  autoscalingKubedbComPgpoolAutoscaler: # +doc-gen:break
    apiVersion: autoscaling.kubedb.com/v1alpha1
    kind: PgpoolAutoscaler
    metadata:
      name: pgpool
      namespace: demo
  certManagerIoIssuer_ca: # +doc-gen:break
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: pgpool-ca
      namespace: demo
  gitopsKubedbComPgpool: # +doc-gen:break
    apiVersion: gitops.kubedb.com/v1alpha1
    kind: Pgpool
    metadata:
      name: pgpool
      namespace: pool
  kubedbComPgpool: # +doc-gen:break
    apiVersion: kubedb.com/v1alpha2
    kind: Pgpool
    metadata:
      name: pgpool
      namespace: pool
  monitoringCoreosComServiceMonitor: # +doc-gen:break
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: pgpool
      namespace: demo
  secret_auth: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: pgpool-auth
      namespace: demo
  secret_config: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: pgpool-config
      namespace: demo
