step:
- elements:
  - elements:
    - elements:
      - elements:
        - elements:
          - label: Can users modify Deployment type?
            schema: schema/properties/spec/properties/admin/properties/deployment/properties/toggle
            type: switch
          - isHorizontal: true
            label: ""
            options:
            - description: For exploring databases when high-performance is not required.
              text: Shared
              value: Shared
            - description: For production applications with sophisticated workload
                requirements.
              text: Dedicated
              value: Dedicated
            schema: schema/properties/spec/properties/admin/properties/deployment/properties/default
            type: radio
          hideBlock: true
          label: Deployment Type
          showLabels: true
          type: block-layout
        - elements:
          - label: Can users modify Cluster Tier?
            schema: schema/properties/spec/properties/admin/properties/clusterTier/properties/toggle
            type: switch
          - isHorizontal: true
            label: ""
            options:
            - text: General Purpose
              value: GeneralPurpose
            - text: Memory Optimized
              value: MemoryOptimized
            - text: CPU Optimized
              value: CPUOptimized
            schema: schema/properties/spec/properties/admin/properties/clusterTier/properties/default
            type: radio
          - elements:
            - label: Can user modify Placement?
              schema: schema/properties/spec/properties/admin/properties/clusterTier/properties/placement/properties/toggle
              type: switch
            - label: Available Placements
              loader:
                name: getPlacements
                watchPaths:
                - temp/bundle
              multiple: true
              schema: schema/properties/spec/properties/admin/properties/clusterTier/properties/placement/properties/available
              type: select
            - disableUnselect: true
              label: Default Placement
              loader:
                name: getOptions|clusterTier/placement
                watchPaths:
                - schema/spec/admin/clusterTier/placement/available
              schema: schema/properties/spec/properties/admin/properties/clusterTier/properties/placement/properties/default
              type: select
            showLabels: false
            type: block-layout
          - elements:
            - label: Can user modify Node Topology?
              schema: schema/properties/spec/properties/admin/properties/clusterTier/properties/nodeTopology/properties/toggle
              type: switch
            - label: Available Node Topologies
              loader:
                name: getNodeTopology
                watchPaths:
                - temp/bundle
              multiple: true
              schema: schema/properties/spec/properties/admin/properties/clusterTier/properties/nodeTopology/properties/available
              type: select
            - disableUnselect: true
              label: Default Node Topology
              loader:
                name: getOptions|clusterTier/nodeTopology
                watchPaths:
                - schema/spec/admin/clusterTier/nodeTopology/available
              schema: schema/properties/spec/properties/admin/properties/clusterTier/properties/nodeTopology/properties/default
              type: select
            showLabels: false
            type: block-layout
          hideBlock: false
          label: Cluster Tier
          showLabels: true
          type: block-layout
        - elements:
          - init:
              type: func
              value: hasMachineProfiles
            label: Use custom profiles?
            schema: temp/enableProfiles
            type: switch
            watcher:
              func: onMachineProfilesToggle
              paths:
              - temp/enableProfiles
          - elements:
            - elements:
              - label: Choose from well-known profiles
                schema: temp/profileChoseSwitch
                type: switch
              - if:
                  name: isKnownProfileToggled
                  type: function
                label: Profile
                loader: getKnownProfile
                schema: temp/profile
                type: select
              - label: ID
                loader:
                  name: getProfileName
                  watchPaths:
                  - temp/spec/admin/machineProfiles/machines/dynamicIndex/temp/profile
                schema: id
                type: input
                validation:
                  type: required
              - label: Name
                loader:
                  name: getProfileName
                  watchPaths:
                  - temp/spec/admin/machineProfiles/machines/dynamicIndex/temp/profile
                schema: name
                type: input
              - label: CPU Limits
                loader:
                  name: setLimits|cpu
                  watchPaths:
                  - temp/spec/admin/machineProfiles/machines/dynamicIndex/temp/profile
                schema: limits/properties/cpu
                type: input
                validation:
                  type: required
              - label: Memory Limits
                loader:
                  name: setLimits|memory
                  watchPaths:
                  - temp/spec/admin/machineProfiles/machines/dynamicIndex/temp/profile
                schema: limits/properties/memory
                type: input
                validation:
                  type: required
              init:
                type: func
                value: setMachineProfiles
              label: Machine Profiles
              schema: temp/properties/spec/properties/admin/properties/machineProfiles/properties/machines
              type: array-object-form
              watcher:
                func: onMachineProfileChange
                paths:
                - temp/properties/spec/properties/admin/properties/machineProfiles/properties/machines
            - init:
                type: func
                value: hasCustomProfile
              label: Can users set their own custom CPU & memory resources?
              schema: temp/useCustomProfile
              type: switch
            - customClass: mt-10
              init:
                type: func
                value: setCustomAvlMachine
              label: Available Machines
              loader:
                name: getMachines
                watchPaths:
                - schema/spec/admin/machineProfiles/machines
                - temp/useCustomProfile
              multiple: true
              schema: schema/properties/spec/properties/admin/properties/machineProfiles/properties/available
              type: select
              watcher:
                func: onAvailableMachineChange
                paths:
                - temp/spec/admin/machineProfiles/available
                - temp/useCustomProfile
            - label: Default Machine
              loader:
                name: getAvailableMachines
                watchPaths:
                - schema/spec/admin/machineProfiles/available
              schema: schema/properties/spec/properties/admin/properties/machineProfiles/properties/default
              type: select
            if:
              name: isEnableProfiles
              type: function
            type: block-layout
          hideBlock: true
          label: Configure MachineProfiles
          showLabels: true
          type: block-layout
        - elements:
          - buttonClass: is-light is-outlined
            label: Node Selector
            schema: temp/properties/spec/properties/admin/properties/nodeSelector
            type: object-item
            watcher:
              func: onNodeSelectorChange
              paths:
              - temp/properties/spec/properties/admin/properties/nodeSelector
          hideBlock: true
          label: Node Selector
          showLabels: true
          type: block-layout
        - elements:
          - elements:
            - label: Key
              schema: key
              type: input
            - label: Operator
              options:
              - NoSchedule
              - PreferNoSchedule
              - NoExecute
              schema: operator
              type: select
            - label: Value
              schema: value
              type: input
            - label: Effect
              options:
              - Exists
              - Equal
              schema: effect
              type: select
            - label: Toleration Seconds
              schema: tolerationSeconds
              type: input
            label: New Tolerations
            schema: schema/properties/spec/properties/admin/properties/tolerations
            type: array-object-form
          hideBlock: true
          label: Tolerations
          showLabels: true
          type: block-layout
        hideBlock: true
        label: Machine specifics
        showLabels: true
        type: block-layout
