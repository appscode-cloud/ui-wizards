    metadata:
      name: perconaxtradb
      namespace: demo
  certManagerIoIssuer_ca: # +doc-gen:break
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: perconaxtradb-ca
      namespace: demo
  gitopsKubedbComPerconaXtraDB: # +doc-gen:break
    apiVersion: gitops.kubedb.com/v1alpha1
    kind: PerconaXtraDB
    metadata:
      name: perconaxtradb
      namespace: sdb
  kubedbComPerconaXtraDB: # +doc-gen:break
    apiVersion: kubedb.com/v1
    kind: PerconaXtraDB
    metadata:
      name: perconaxtradb
      namespace: sdb
  monitoringCoreosComServiceMonitor: # +doc-gen:break
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: perconaxtradb
      namespace: demo
  secret_auth: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: perconaxtradb-auth
      namespace: demo
  secret_config: # +doc-gen:break
    apiVersion: v1
    kind: Secret
    metadata:
      name: perconaxtradb-config
      namespace: demo
